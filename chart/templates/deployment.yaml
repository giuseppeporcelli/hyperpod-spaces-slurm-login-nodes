apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hyperpod-spaces-user-webhook.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "hyperpod-spaces-user-webhook.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: {{ include "hyperpod-spaces-user-webhook.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "hyperpod-spaces-user-webhook.fullname" . }}
    spec:
      serviceAccountName: {{ include "hyperpod-spaces-user-webhook.fullname" . }}
      containers:
        - name: webhook
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8443
          volumeMounts:
            - name: certs
              mountPath: /certs
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 2
            periodSeconds: 5
      volumes:
        - name: certs
          secret:
            secretName: {{ include "hyperpod-spaces-user-webhook.fullname" . }}-tls
