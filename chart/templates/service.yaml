apiVersion: v1
kind: Service
metadata:
  name: {{ include "hyperpod-spaces-user-webhook.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "hyperpod-spaces-user-webhook.labels" . | nindent 4 }}
spec:
  selector:
    app: {{ include "hyperpod-spaces-user-webhook.fullname" . }}
  ports:
    - port: 443
      targetPort: 8443
