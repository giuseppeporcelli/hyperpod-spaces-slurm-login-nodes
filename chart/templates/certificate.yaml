apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "hyperpod-spaces-user-webhook.fullname" . }}-cert
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "hyperpod-spaces-user-webhook.labels" . | nindent 4 }}
spec:
  secretName: {{ include "hyperpod-spaces-user-webhook.fullname" . }}-tls
  dnsNames:
    - {{ include "hyperpod-spaces-user-webhook.fullname" . }}.{{ .Values.namespace }}.svc
    - {{ include "hyperpod-spaces-user-webhook.fullname" . }}.{{ .Values.namespace }}.svc.cluster.local
  issuerRef:
    name: {{ .Values.certManager.issuerName }}
    kind: {{ .Values.certManager.issuerKind }}
