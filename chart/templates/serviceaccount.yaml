apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "hyperpod-spaces-user-webhook.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "hyperpod-spaces-user-webhook.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
