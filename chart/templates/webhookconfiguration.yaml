apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "hyperpod-spaces-user-webhook.fullname" . }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Values.namespace }}/{{ include "hyperpod-spaces-user-webhook.fullname" . }}-cert
  labels:
    {{- include "hyperpod-spaces-user-webhook.labels" . | nindent 4 }}
webhooks:
  - name: {{ include "hyperpod-spaces-user-webhook.fullname" . }}.{{ .Values.namespace }}.svc
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Ignore
    clientConfig:
      service:
        name: {{ include "hyperpod-spaces-user-webhook.fullname" . }}
        namespace: {{ .Values.namespace }}
        path: /mutate
    rules:
      - apiGroups: ["workspace.jupyter.org"]
        apiVersions: ["v1alpha1"]
        resources: ["workspaces"]
        operations: ["CREATE", "UPDATE"]
