image:
  repository: 414900938744.dkr.ecr.us-west-2.amazonaws.com/hyperpod-spaces-user-webhook
  tag: latest
  pullPolicy: Always

replicas: 1

namespace: jupyter-k8s-system

certManager:
  issuerName: jupyter-k8s-selfsigned-issuer
  issuerKind: Issuer

serviceAccount:
  annotations: {}

# List of GPU instance types used to build anti-affinity rules for non-GPU
# workloads. When a workspace does NOT request GPUs, the webhook injects a
# node affinity rule to avoid scheduling on these instance types.
# This list is stored in a ConfigMap and watched for live updates — no
# redeployment needed when editing.
gpuInstanceTypes:
  - ml.g5.24xlarge
  - ml.p5.48xlarge

# GPU instance resource allocation configuration.
# Maps instance types to discrete GPU-count entries. When a workspace requests
# GPUs and has a beta.kubernetes.io/instance-type node selector, the webhook
# patches CPU/memory resources based on this mapping.
gpuInstanceResources:
  ml.g5.24xlarge:
    - gpus: 1
      cpu: "21"
      memory: "84Gi"
    - gpus: 2
      cpu: "42"
      memory: "168Gi"
    - gpus: 4
      cpu: "84"
      memory: "336Gi"
  ml.p5.48xlarge:
    - gpus: 1
      cpu: "21"
      memory: "230Gi"
    - gpus: 2
      cpu: "42"
      memory: "460Gi"
    - gpus: 4
      cpu: "84"
      memory: "920Gi"
    - gpus: 8
      cpu: "168"
      memory: "1840Gi"
