# =============================================================================
# EXAMPLE slurm.conf — DO NOT USE IN PRODUCTION
# =============================================================================
# Copy the real slurm.conf from your Slurm controller node.
# Typically found at /usr/local/etc/slurm.conf on the controller.
#
# This placeholder shows the minimum structure Slurm expects.
# See: https://slurm.schedmd.com/slurm.conf.html
# =============================================================================

ClusterName=example-cluster
SlurmctldHost=controller-hostname

MpiDefault=none
ProctrackType=proctrack/cgroup
ReturnToService=1
SlurmctldPidFile=/var/run/slurmctld.pid
SlurmdPidFile=/var/run/slurmd.pid
SlurmdSpoolDir=/var/spool/slurmd
SlurmUser=slurm
StateSaveLocation=/var/spool/slurmctld
SwitchType=switch/none
TaskPlugin=task/affinity

# Scheduling
SchedulerType=sched/backfill
SelectType=select/cons_tres

# Logging
SlurmctldLogFile=/var/log/slurm/slurmctld.log
SlurmdLogFile=/var/log/slurm/slurmd.log

# Compute nodes (replace with your actual node definitions)
NodeName=compute-[001-004] CPUs=96 RealMemory=384000 State=UNKNOWN
PartitionName=default Nodes=compute-[001-004] Default=YES MaxTime=INFINITE State=UP
