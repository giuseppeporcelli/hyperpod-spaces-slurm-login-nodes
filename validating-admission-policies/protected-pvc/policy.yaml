apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: protected-pvc-template-check
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: ["workspace.jupyter.org"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["workspaces"]
  validations:
    - expression: >-
        !has(object.spec.volumes) ||
        !object.spec.volumes.exists(v, v.persistentVolumeClaimName == params.data.pvcName) ||
        (has(object.metadata.labels) &&
         'workspace.jupyter.org/template-name' in object.metadata.labels &&
         ('\n' + params.data.allowedTemplates + '\n').contains('\n' + object.metadata.labels['workspace.jupyter.org/template-name'] + '\n'))
      messageExpression: >-
        'workspace uses PVC "' + params.data.pvcName + '" but template "' +
        (has(object.metadata.labels) && 'workspace.jupyter.org/template-name' in object.metadata.labels
          ? object.metadata.labels['workspace.jupyter.org/template-name']
          : '<missing>') +
        '" is not in the allowed list'
  paramKind:
    apiVersion: v1
    kind: ConfigMap
